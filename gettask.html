<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML CSS Tasks</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    height:100vh;
    background-image:url("https://th.bing.com/th/id/OIP.JkSi27Q9ex2iYrnCgFMTxwHaE8?w=246&h=180&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3");
    background-size:cover;
    background-position:center;
    position:relative;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-left:80px;
}

h1{
    color:white;
    font-size:48px;
    margin-bottom:30px;
}

.features-title{
    color:yellow;
    font-size:36px;
    font-weight:bold;
    margin-bottom:20px;
}

ul{
    color:#e6e64c;
    font-size:28px;
    line-height:1.8;
}
</style>
</head>

<body>

<div class="container">
    <div class="overlay">
        <h1>Get Your HTML and<br>CSS Tasks Done</h1>

        <div class="features-title">Key Features:</div>

        <ul>
            <li>Responsive Design</li>
            <li>100% Satisfaction</li>
            <li>Moneyback Gurentee</li>
            <li>ASAP Delivery</li>
            <li>Cross-browser support</li>
        </ul>
    </div>
</div>

</body>
</html>
